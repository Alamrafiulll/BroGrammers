<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MMU Engineering & STEM Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <div class="logo">MMU</div>
      <div>
        <p class="eyebrow">Multimedia University</p>
        <h1>Engineering & Technology Community</h1>
      </div>
    </div>

    <!-- NEW: top navigation -->
    <nav class="header-nav">
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('stem_page') }}">STEM Portal</a>
      <a href="{{ url_for('contact_page') }}">Contact</a>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div>
      <strong>MMU Engineering & STEM</strong> – Connecting students with mentors, teams, and projects.
    </div>
    <div class="footer-links">
      <span>Built for the MMU STEM community</span>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
